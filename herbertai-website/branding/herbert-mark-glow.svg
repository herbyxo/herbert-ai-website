<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="320" height="320">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(4 4)">
    <rect width="32" height="32" rx="7" fill="#0A0A0A"/>
    <text x="50%" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="22" letter-spacing="-1" fill="#F5F0E5" text-anchor="middle">h</text>
    <circle cx="24.5" cy="8.5" r="2.4" fill="#00FF88" filter="url(#glow)"/>
  </g>
</svg>
